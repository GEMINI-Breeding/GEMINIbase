name: gemini
services:
  db:
    container_name: ${GEMINI_DB_HOSTNAME}
    hostname: ${GEMINI_DB_HOSTNAME}
    restart: always
    build:
      context: ../db
      dockerfile: Dockerfile
    # image: ${GEMINI_DB_IMAGE_NAME}:latest
    ports:
      - "${GEMINI_DB_PORT}:5432"
    environment:
      # Official postgres image env vars
      - "POSTGRES_USER=${GEMINI_DB_USER}"
      - "POSTGRES_PASSWORD=${GEMINI_DB_PASSWORD}"
      - "POSTGRES_DB=${GEMINI_DB_NAME}"
      # Also set Bitnami-style names for init scripts that reference them
      - "POSTGRESQL_USERNAME=${GEMINI_DB_USER}"
      - "POSTGRESQL_PASSWORD=${GEMINI_DB_PASSWORD}"
      - "POSTGRESQL_DATABASE=${GEMINI_DB_NAME}"
    volumes:
      - gemini_db_data:/var/lib/postgresql/data
    networks:
      - gemini_network

  storage:
    container_name: ${GEMINI_STORAGE_HOSTNAME}
    hostname: ${GEMINI_STORAGE_HOSTNAME}
    restart: always
    build:
      context: ../storage
      dockerfile: Dockerfile
    # image: ${GEMINI_STORAGE_IMAGE_NAME}:latest
    ports:
      - "${GEMINI_STORAGE_PORT}:9000"
      - "${GEMINI_STORAGE_API_PORT}:9001"
    environment:
      - "MINIO_ROOT_USER=${GEMINI_STORAGE_ROOT_USER}"
      - "MINIO_ROOT_PASSWORD=${GEMINI_STORAGE_ROOT_PASSWORD}"
      # - "MINIO_SCHEME=http"
      # - "BITNAMI_DEBUG=true"
    volumes:
      - gemini_storage_data:/data
    command: server /data --console-address :9001
    networks:
      - gemini_network
    depends_on:
      - db
    
  storage-init:
    image: minio/mc:latest
    networks:
      - gemini_network
    depends_on:
      - storage
    environment:
      - "MINIO_ACCESS_KEY=${GEMINI_STORAGE_ROOT_USER}"
      - "MINIO_SECRET_KEY=${GEMINI_STORAGE_ROOT_PASSWORD}"
      - "MINIO_SERVER_HOST=${GEMINI_STORAGE_HOSTNAME}"
      - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
      - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
    volumes:
      - ../storage/scripts/init_minio.sh:/usr/local/bin/init_minio.sh
    entrypoint: >
      /bin/sh -c "sleep 10 && /usr/local/bin/init_minio.sh"

  logger:
    container_name: ${GEMINI_LOGGER_HOSTNAME}
    hostname: ${GEMINI_LOGGER_HOSTNAME}
    restart: always
    build:
      context: ../logger
      dockerfile: Dockerfile
    # image: ${GEMINI_LOGGER_IMAGE_NAME}:latest
    ports:
      - "${GEMINI_LOGGER_PORT}:6379"
    environment:
      - "REDIS_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
      - "REDIS_PORT=${GEMINI_LOGGER_PORT}"
      - "REDIS_MAX_MEMORY=${GEMINI_LOGGER_MAX_MEMORY:-256mb}"
    volumes:
      - gemini_logger_data:/data
      - ../logger/redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass "${GEMINI_LOGGER_PASSWORD}"
      --port ${GEMINI_LOGGER_PORT}
      --maxmemory ${GEMINI_LOGGER_MAX_MEMORY:-256mb}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gemini_network

  rest-api:
    container_name: ${GEMINI_REST_API_HOSTNAME}
    hostname: ${GEMINI_REST_API_HOSTNAME}
    restart: always
    build:
      context: ../../  # Adjust the context to the parent directory that contains 'gemini'
      dockerfile: ./gemini/rest_api/Dockerfile  # Specify the path to the Dockerfile relative to the context
    # image: ${GEMINI_REST_API_IMAGE_NAME}:latest
    ports:
      - "${GEMINI_REST_API_PORT}:7777"
      - "5678:5678"
    environment:
      - "GEMINI_DB_URL=postgresql://${GEMINI_DB_USER}:${GEMINI_DB_PASSWORD}@${GEMINI_DB_HOSTNAME}:${GEMINI_DB_PORT}/${GEMINI_DB_NAME}"
      - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
      - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
      - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
      - "GEMINI_STORAGE_API_PORT=${GEMINI_STORAGE_API_PORT}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Live-reload dev mount: edits to gemini/* on the host take effect immediately.
      # Without this, the image's April-built copy of gemini/ drifts from the source
      # and you get stale-code bugs that are invisible until something goes wrong.
      - ../../gemini:/gemini-framework/gemini:ro
    command: >
      poetry run litestar --app gemini.rest_api.app:app run
      --host 0.0.0.0 --port 7777 --reload --reload-dir /gemini-framework/gemini
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7777/schema')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - gemini_network

  titiler:
    container_name: gemini-titiler
    hostname: gemini-titiler
    restart: always
    image: ghcr.io/developmentseed/titiler:2.0.1
    ports:
      - "${GEMINI_TITILER_PORT:-8091}:80"
    environment:
      # Point GDAL/rasterio at MinIO via S3 protocol
      - "AWS_ACCESS_KEY_ID=${GEMINI_STORAGE_ACCESS_KEY}"
      - "AWS_SECRET_ACCESS_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "AWS_S3_ENDPOINT=http://${GEMINI_STORAGE_HOSTNAME}:9000"
      - "AWS_HTTPS=NO"
      - "AWS_VIRTUAL_HOSTING=FALSE"
      - "GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR"
      - "GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES"
      - "VSI_CACHE=TRUE"
      - "VSI_CACHE_SIZE=5000000"
    depends_on:
      - storage
    networks:
      - gemini_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Processing Workers (uncomment as needed) ──────────────────────
  # Each worker polls the REST API for PENDING jobs, processes them,
  # and reports progress back. Workers access files via MinIO.
  #
  # gemini-worker-ml:
  #   container_name: gemini-worker-ml
  #   restart: always
  #   build:
  #     context: ../../
  #     dockerfile: ./gemini/workers/ml/Dockerfile
  #   environment:
  #     - "GEMINI_REST_API_URL=http://${GEMINI_REST_API_HOSTNAME}:7777"
  #     - "GEMINI_LOGGER_HOSTNAME=${GEMINI_LOGGER_HOSTNAME}"
  #     - "GEMINI_LOGGER_PORT=${GEMINI_LOGGER_PORT}"
  #     - "GEMINI_LOGGER_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
  #     - "GEMINI_STORAGE_HOSTNAME=${GEMINI_STORAGE_HOSTNAME}"
  #     - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
  #     - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
  #     - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
  #     - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
  #   depends_on:
  #     rest-api:
  #       condition: service_healthy
  #   networks:
  #     - gemini_network
  #
  # gemini-worker-stitch:
  #   container_name: gemini-worker-stitch
  #   restart: always
  #   build:
  #     context: ../../
  #     dockerfile: ./gemini/workers/stitch/Dockerfile
  #   environment:
  #     - "GEMINI_REST_API_URL=http://${GEMINI_REST_API_HOSTNAME}:7777"
  #     - "GEMINI_LOGGER_HOSTNAME=${GEMINI_LOGGER_HOSTNAME}"
  #     - "GEMINI_LOGGER_PORT=${GEMINI_LOGGER_PORT}"
  #     - "GEMINI_LOGGER_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
  #     - "GEMINI_STORAGE_HOSTNAME=${GEMINI_STORAGE_HOSTNAME}"
  #     - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
  #     - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
  #     - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
  #     - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
  #   depends_on:
  #     rest-api:
  #       condition: service_healthy
  #   networks:
  #     - gemini_network
  #
  gemini-nodeodm:
    container_name: gemini-nodeodm
    hostname: gemini-nodeodm
    image: opendronemap/nodeodm:latest
    ports:
      - "${GEMINI_NODEODM_PORT:-13000}:3000"
    volumes:
      - nodeodm_data:/var/www/data
    networks:
      - gemini_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  gemini-worker-odm:
    container_name: gemini-worker-odm
    restart: always
    build:
      context: ../../
      dockerfile: ./gemini/workers/odm/Dockerfile
    environment:
      - "GEMINI_REST_API_URL=http://${GEMINI_REST_API_HOSTNAME}:7777"
      - "GEMINI_LOGGER_HOSTNAME=${GEMINI_LOGGER_HOSTNAME}"
      - "GEMINI_LOGGER_PORT=${GEMINI_LOGGER_PORT}"
      - "GEMINI_LOGGER_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
      - "GEMINI_STORAGE_HOSTNAME=${GEMINI_STORAGE_HOSTNAME}"
      - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
      - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
      - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
      - "GEMINI_NODEODM_URL=http://gemini-nodeodm:3000"
    depends_on:
      rest-api:
        condition: service_healthy
      gemini-nodeodm:
        condition: service_healthy
    networks:
      - gemini_network

  gemini-worker-geo:
    container_name: gemini-worker-geo
    restart: always
    build:
      context: ../../
      dockerfile: ./gemini/workers/geo/Dockerfile
    environment:
      - "GEMINI_REST_API_URL=http://${GEMINI_REST_API_HOSTNAME}:7777"
      - "GEMINI_LOGGER_HOSTNAME=${GEMINI_LOGGER_HOSTNAME}"
      - "GEMINI_LOGGER_PORT=${GEMINI_LOGGER_PORT}"
      - "GEMINI_LOGGER_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
      - "GEMINI_STORAGE_HOSTNAME=${GEMINI_STORAGE_HOSTNAME}"
      - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
      - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
      - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
    depends_on:
      rest-api:
        condition: service_healthy
    networks:
      - gemini_network
  #
  gemini-worker-flir:
    container_name: gemini-worker-flir
    restart: always
    build:
      context: ../../
      dockerfile: ./gemini/workers/flir/Dockerfile
    environment:
      - "GEMINI_REST_API_URL=http://${GEMINI_REST_API_HOSTNAME}:7777"
      - "GEMINI_LOGGER_HOSTNAME=${GEMINI_LOGGER_HOSTNAME}"
      - "GEMINI_LOGGER_PORT=${GEMINI_LOGGER_PORT}"
      - "GEMINI_LOGGER_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
      - "GEMINI_STORAGE_HOSTNAME=${GEMINI_STORAGE_HOSTNAME}"
      - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
      - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
      - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
    depends_on:
      rest-api:
        condition: service_healthy
    networks:
      - gemini_network

  gemini-worker-gwas:
    container_name: gemini-worker-gwas
    restart: always
    build:
      context: ../../
      dockerfile: ./gemini/workers/gwas/Dockerfile
    environment:
      - "GEMINI_REST_API_URL=http://${GEMINI_REST_API_HOSTNAME}:7777"
      - "GEMINI_LOGGER_HOSTNAME=${GEMINI_LOGGER_HOSTNAME}"
      - "GEMINI_LOGGER_PORT=${GEMINI_LOGGER_PORT}"
      - "GEMINI_LOGGER_PASSWORD=${GEMINI_LOGGER_PASSWORD}"
      - "GEMINI_STORAGE_HOSTNAME=${GEMINI_STORAGE_HOSTNAME}"
      - "GEMINI_STORAGE_PORT=${GEMINI_STORAGE_PORT}"
      - "GEMINI_STORAGE_ACCESS_KEY=${GEMINI_STORAGE_ACCESS_KEY}"
      - "GEMINI_STORAGE_SECRET_KEY=${GEMINI_STORAGE_SECRET_KEY}"
      - "GEMINI_STORAGE_BUCKET_NAME=${GEMINI_STORAGE_BUCKET_NAME}"
      - "GEMINI_DB_HOSTNAME=${GEMINI_DB_HOSTNAME}"
      - "GEMINI_DB_PORT=${GEMINI_DB_PORT}"
      - "GEMINI_DB_USER=${GEMINI_DB_USER}"
      - "GEMINI_DB_PASSWORD=${GEMINI_DB_PASSWORD}"
      - "GEMINI_DB_NAME=${GEMINI_DB_NAME}"
    depends_on:
      rest-api:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - gemini_network

  gemini-ui:
    container_name: gemini-ui
    restart: always
    build:
      context: ../../gemini-ui
      dockerfile: Dockerfile
    ports:
      - "${GEMINI_UI_PORT:-3000}:80"
    depends_on:
      rest-api:
        condition: service_healthy
    networks:
      - gemini_network

networks:
  gemini_network:
    driver: bridge
    name: gemini_network

volumes:
  gemini_db_data:
  gemini_logger_data:
  gemini_storage_data:
  gemini_scheduler_db_data:
  nodeodm_data:
