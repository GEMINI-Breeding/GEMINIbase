# Docker Compose for integration tests.
# Uses standard PostgreSQL (no Hydra/pg_ivm), MinIO, and Redis.
# Ports offset from production to avoid conflicts.
#
# Usage:
#   docker compose -f tests/docker-compose.test.yaml up -d
#   pytest tests/integration/ -v
#   docker compose -f tests/docker-compose.test.yaml down -v

name: geminibase-test

services:
  test-db:
    image: postgres:16
    container_name: geminibase-test-db
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: gemini_test
      POSTGRES_PASSWORD: gemini_test
      POSTGRES_DB: gemini_test
    volumes:
      - ./init_sql:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gemini_test -d gemini_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-storage:
    image: minio/minio:latest
    container_name: geminibase-test-storage
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-storage-init:
    image: minio/mc:latest
    depends_on:
      test-storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://test-storage:9000 minioadmin minioadmin;
        mc mb --ignore-existing myminio/gemini-test;
        mc admin user add myminio gemini_test_user gemini_test_secret;
        mc admin policy attach myminio readwrite --user gemini_test_user;
        exit 0;
      "

  test-logger:
    image: redis:7-alpine
    container_name: geminibase-test-logger
    ports:
      - "16379:6379"
    command: redis-server --requirepass gemini_test
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "gemini_test", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
